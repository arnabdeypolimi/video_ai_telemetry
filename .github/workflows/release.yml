name: Create Release on Merge to Main

on:
  push:
    branches:
      - main

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: version
        run: |
          # Derive next patch version from the latest semver tag
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "VERSION=$NEXT" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.VERSION }}" | grep -q "${{ steps.version.outputs.VERSION }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.VERSION }}
          git push origin ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.VERSION }} \
            --title "ModalTrace ${{ steps.version.outputs.VERSION }}" \
            --notes "## What's New in ${{ steps.version.outputs.VERSION }}

          ### Dashboard Module
          - Full observability dashboard (\`pip install modaltrace[dashboard]\`)
          - FastAPI server receiving OTLP telemetry on port 4318
          - Real-time pipeline latency charts (inference, render, encode P95)
          - GPU monitoring cards with utilization, memory, temperature, and power draw
          - Trace table with expandable span attributes
          - Logs feed with severity filter pills

          ### Documentation
          - New API, Architecture, Comparison, and Examples guides
          - Updated README with demo GIF and logo
          - Updated wiki pages

          ### Testing
          - Comprehensive test suite covering API, frontend data, proto parsing, and store logic" \
            --latest
