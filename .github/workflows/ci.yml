name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run --python ${{ matrix.python-version }} ruff check src/ tests/

      - name: Test
        run: uv run --python ${{ matrix.python-version }} pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv pip install -e ".[dev]" --python 3.12
      - run: uv run --python 3.12 ruff check src/ tests/
      - run: uv run --python 3.12 ruff format --check src/ tests/
