<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#00d4ff" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="320" height="80" rx="10" fill="#080808" />

  <!-- Icon -->
  <g transform="translate(8, 8)">
    <rect x="2" y="2" width="60" height="60" rx="14" fill="rgba(255,255,255,0.03)" stroke="url(#grad)" stroke-width="2" opacity="0.8" />
    <polyline
      points="14,38 24,38 30,20 38,46 44,26 52,38"
      fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Wordmark -->
  <text x="86" y="48" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#ffffff">Modal</tspan><tspan fill="url(#grad)">Trace</tspan>
  </text>

  <!-- Tagline -->
  <text x="88" y="64" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10" font-weight="400" fill="#888888" letter-spacing="2">
    VIDEO AI OBSERVABILITY
  </text>
</svg>
